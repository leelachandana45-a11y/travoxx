<!DOCTYPE html>
<html>
<head>
    <title>Transport | Travox</title>
    <link rel="stylesheet" href="feature.css">

    <style>
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .map-box {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .ride {
            background: #fffaf3;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.4s forwards;
        }

        .ride:hover {
            transform: translateY(-5px);
        }

        .ride.selected {
            border: 2px solid #8B4513;
            background: #f3e4d4;
        }

        .ride h3 {
            color: #8B4513;
        }

        .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: green;
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:900px){
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="page">

    <h1>🚕 Transport Price Estimator</h1>

    <!-- INPUT -->
    <div class="search-bar">
        <input type="text" id="pickup" placeholder="Enter Pickup Location">
        <input type="text" id="drop" placeholder="Enter Drop Location">
        <button onclick="searchRide()">Search</button>
    </div>

    <div class="layout">

        <!-- MAP -->
        <div class="map-box">
            <iframe id="mapFrame"
                src="https://www.google.com/maps?q=India&output=embed">
            </iframe>
        </div>

        <!-- RIDES -->
        <div id="rides"></div>

    </div>

</div>

<script>

const rideData = [
    {type:"Auto 🚕", price:120, time:"15 min", distance:"4 km"},
    {type:"Mini 🚗", price:180, time:"12 min", distance:"4 km"},
    {type:"Sedan 🚙", price:250, time:"10 min", distance:"4 km"},
    {type:"Bus 🚌", price:40, time:"25 min", distance:"4 km"}
];

function searchRide(){
    const pickup = document.getElementById("pickup").value;
    const drop = document.getElementById("drop").value;

    if(pickup === "" || drop === ""){
        alert("⚠ Please enter pickup and drop locations");
        return;
    }

    // UPDATE MAP (NO API)
    const mapUrl = `https://www.google.com/maps?q=${pickup} to ${drop}&output=embed`;
    document.getElementById("mapFrame").src = mapUrl;

    // SHOW RIDES
    const container = document.getElementById("rides");
    container.innerHTML = "";

    container.innerHTML += `
    <h3 style="margin-bottom:15px">
        📍 ${pickup} → ${drop}
    </h3>
    `;

    const cheapest = Math.min(...rideData.map(r=>r.price));

    rideData.forEach((r, index)=>{
        container.innerHTML += `
        <div class="ride" style="animation-delay:${index*0.1}s"
            onclick="selectRide(this)">

            ${r.price === cheapest ? '<div class="tag">Cheapest</div>' : ''}

            <h3>${r.type}</h3>
            <p><b>₹${r.price}</b></p>
            <p>⏱ ${r.time}</p>
            <p>📍 ${r.distance}</p>
        </div>`;
    });
}

function selectRide(el){
    document.querySelectorAll(".ride").forEach(r=>r.classList.remove("selected"));
    el.classList.add("selected");
}

</script>

</body>
</html>
