<!DOCTYPE html>
<html>
<head>
    <title>Tourist Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-wrapper">

    <!-- LEFT LOGIN -->
    <div class="login-box">
        <h2>🧳 Tourist Login</h2>

        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <p>Demo access for tourists</p>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="login-image"></div>

</div>

<script>
function login() {

    var email = document.querySelector("input[type='text']").value;
    var password = document.querySelector("input[type='password']").value;

    var fields = [email, password];

    // Loop to check empty fields
    for (var i = 0; i < fields.length; i++) {
        if (fields[i] === "") {
            alert("⚠ Please fill all fields!");
            return;
        }
    }

    // Allow only Gmail accounts
    if (!email.includes("@gmail.com")) {
        alert("❌ Only Gmail accounts are allowed!");
        return;
    }

    // Password minimum length
    if (password.length < 4) {
        alert("❌ Password must be at least 4 characters!");
        return;
    }

    alert("✅ Login Successful!");
    window.location.href = "tourist.html";
}
</script>
</body>

</html>
