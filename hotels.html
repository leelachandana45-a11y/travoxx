<!DOCTYPE html>
<html>
<head>
    <title>Hotels | Travox</title>

    <style>
        body {
            background: #f5efe6;
            font-family: "Segoe UI", Arial;
            margin: 0;
        }

        .page {
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            color: #8b4513;
        }

        /* SEARCH */
        .search-bar {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .search-bar input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .search-bar button {
            background: #8b4513;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            background: #6f3510;
        }

        /* FILTERS */
        .filters {
            margin-bottom: 20px;
        }

        .filters button {
            margin: 5px;
            padding: 8px 14px;
            border: none;
            background: #d2b48c;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filters button:hover {
            background: #c19a6b;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* IMAGE */
        .hotel-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: 0.4s;
        }

        .card:hover .hotel-img {
            transform: scale(1.1);
        }

        .card-body {
            padding: 15px;
        }

        .price {
            font-weight: bold;
            color: #8b4513;
        }

        .rating {
            margin: 5px 0;
        }

        .card button {
            margin-top: 10px;
            width: 100%;
            background: #8b4513;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card button:hover {
            background: #6f3510;
            transform: scale(1.05);
        }

        /* ANIMATION */
        .animate {
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .modal-content button {
            margin-top: 15px;
            background: #8b4513;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="page">

    <h1>🏨 Find Hotels</h1>

    <div class="search-bar">
        <input type="text" id="city" placeholder="Search city (Chennai, Bangalore...)">
        <button onclick="searchHotels()">Search</button>
    </div>

    <div class="filters">
        <button onclick="filterHotels('all')">All</button>
        <button onclick="filterHotels('low')">Low</button>
        <button onclick="filterHotels('medium')">Medium</button>
        <button onclick="filterHotels('luxury')">Luxury</button>
    </div>

    <div id="hotelList" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="hotelName"></h2>
        <p id="hotelPrice"></p>
        <button onclick="pay()">Continue & Pay</button>
    </div>
</div>

<script>
const hotels = [
    {
        name:"Taj Club House",
        price:7500,
        type:"luxury",
        city:"chennai",
        img:"https://images.unsplash.com/photo-1566073771259-6a8506099945"
    },
    {
        name:"The Residency",
        price:3500,
        type:"medium",
        city:"chennai",
        img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa"
    },
    {
        name:"OYO Stay Inn",
        price:1200,
        type:"low",
        city:"chennai",
        img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
    },
    {
        name:"Leela Palace",
        price:9000,
        type:"luxury",
        city:"chennai",
        img:"https://images.unsplash.com/photo-1578898887932-dce23a595ad4"
    }
];

function searchHotels() {
    const city = document.getElementById("city").value.toLowerCase();
    const list = document.getElementById("hotelList");
    list.innerHTML = "";

    const results = hotels.filter(h => h.city.includes(city));

    if(results.length === 0){
        list.innerHTML = "<p>No hotels found</p>";
        return;
    }

    results.forEach(h => {
        list.innerHTML += `
        <div class="card animate">
            <img src="${h.img}" class="hotel-img">

            <div class="card-body">
                <h3>${h.name}</h3>
                <p class="price">₹${h.price} / night</p>
                <p class="rating">⭐ 4.${Math.floor(Math.random()*5)}</p>

                <button onclick="book('${h.name}', ${h.price})">
                    Book Now
                </button>
            </div>
        </div>`;
    });
}

function filterHotels(type){
    if(type === "all"){
        searchHotels();
        return;
    }

    const list = document.getElementById("hotelList");
    list.innerHTML = "";

    hotels.filter(h=>h.type===type).forEach(h=>{
        list.innerHTML += `
        <div class="card animate">
            <img src="${h.img}" class="hotel-img">
            <div class="card-body">
                <h3>${h.name}</h3>
                <p class="price">₹${h.price}</p>
                <button onclick="book('${h.name}', ${h.price})">Book Now</button>
            </div>
        </div>`;
    });
}

function book(name, price){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("hotelName").innerText = name;
    document.getElementById("hotelPrice").innerText = "₹" + price;
}

function pay(){
    alert("✅ Payment Successful\n✅ Booking Confirmed");
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
